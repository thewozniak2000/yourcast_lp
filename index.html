<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>yourcast — a podcast no one else will hear</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #faf7f2; -webkit-font-smoothing: antialiased; }
    #root { isolation: isolate; }

    /* Placeholder colours */
    .yc-ph-light::placeholder { color: rgba(45,41,38,0.38); }
    .yc-ph-dark::placeholder  { color: rgba(250,247,242,0.38); }

    /* Pill drift animation */
    @keyframes pillDrift {
      0%,100% { transform: translateY(0px);   opacity: 1;    }
      30%      { transform: translateY(-4px);  opacity: 0.85; }
      65%      { transform: translateY(2px);   opacity: 0.95; }
    }

    /* Waveform bar animation */
    @keyframes waveBar {
      0%, 100% { transform: scaleY(0.28); }
      50%       { transform: scaleY(1);    }
    }

    /* Live pulse dot */
    @keyframes livePulse {
      0%, 100% { opacity: 1;   transform: scale(1);   }
      50%       { opacity: 0.3; transform: scale(0.65); }
    }

    /* How It Works responsive */
    @media (max-width: 780px) {
      .lp-step-row    { flex-direction: column !important; gap: 28px !important; }
      .lp-step-phone  { display: none !important; }
      .lp-hero-phone  { display: none !important; }
      .lp-hero-layout { flex-direction: column !important; padding-bottom: 60px; }
    }

    /* Global link reset */
    a { color: inherit; }

    /* Smooth FAQ expand */
    button { -webkit-tap-highlight-color: transparent; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="landing-ds.jsx"></script>
  <script type="text/babel" src="landing-s1.jsx"></script>
  <script type="text/babel" src="landing-s2.jsx"></script>
  <script type="text/babel" src="landing-s3.jsx"></script>
  <script type="text/babel" src="landing-app.jsx"></script>
</body>
</html>
