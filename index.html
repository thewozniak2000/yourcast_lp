<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>yourcast — a podcast no one else will hear</title>

  <!-- ── Code-referenced image resources ── -->
  <meta name="ext-resource-dependency" content="uploads/X_icon.svg.png" data-resource-id="xIcon" />
  <meta name="ext-resource-dependency" content="uploads/youtube-logo-youtube-icon-transparent-free-png.webp" data-resource-id="youtubeIcon" />
  <meta name="ext-resource-dependency" content="uploads/Reddit_Logo_Icon.svg.png" data-resource-id="redditIcon" />
  <meta name="ext-resource-dependency" content="uploads/instagram-logo-instagram-icon-transparent-free-png.webp" data-resource-id="instagramIcon" />
  <meta name="ext-resource-dependency" content="uploads/facebook-logo-facebook-icon-transparent-free-png.webp" data-resource-id="facebookIcon" />
  <meta name="ext-resource-dependency" content="uploads/free-apple-mail-icon-svg-download-png-493152.webp" data-resource-id="mailIcon" />
  <meta name="ext-resource-dependency" content="uploads/rss-color-icon.webp" data-resource-id="rssIcon" />
  <meta name="ext-resource-dependency" content="uploads/substack.png" data-resource-id="substackIcon" />
  <meta name="ext-resource-dependency" content="uploads/team_photos-1779999882632.png" data-resource-id="team1Photo" />
  <meta name="ext-resource-dependency" content="uploads/1730760981526.jpeg" data-resource-id="team2Photo" />

  <!-- ── Bundler thumbnail ── -->
  <template id="__bundler_thumbnail" data-bg-color="#faf7f2">
    <svg viewBox="0 0 160 80" xmlns="http://www.w3.org/2000/svg">
      <text x="18" y="50" font-family="sans-serif" font-size="28" font-weight="400" fill="#2d2926">your</text>
      <text x="86" y="52" font-family="Georgia, serif" font-size="32" font-style="italic" fill="#c4654a">cast</text>
    </svg>
  </template>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #faf7f2; -webkit-font-smoothing: antialiased; }
    #root { isolation: isolate; }

    .yc-ph-light::placeholder { color: rgba(45,41,38,0.38); }
    .yc-ph-dark::placeholder  { color: rgba(250,247,242,0.38); }

    @keyframes pillDrift {
      0%,100% { transform: translateY(0px);   opacity: 1;    }
      30%      { transform: translateY(-4px);  opacity: 0.85; }
      65%      { transform: translateY(2px);   opacity: 0.95; }
    }
    @keyframes waveBar {
      0%, 100% { transform: scaleY(0.28); }
      50%       { transform: scaleY(1);    }
    }
    @keyframes livePulse {
      0%, 100% { opacity: 1;   transform: scale(1);   }
      50%       { opacity: 0.3; transform: scale(0.65); }
    }

    @media (max-width: 780px) {
      .lp-step-row    { flex-direction: column !important; gap: 28px !important; }
      .lp-step-phone  { display: none !important; }
      .lp-hero-phone  { display: none !important; }
      .lp-hero-layout { flex-direction: column !important; padding-bottom: 60px; }
    }

    a { color: inherit; }
    button { -webkit-tap-highlight-color: transparent; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script>
    // Build window.__resources from meta tags
    window.__resources = {};
    document.querySelectorAll('meta[name="ext-resource-dependency"]').forEach(function(meta) {
      var id = meta.getAttribute('data-resource-id');
      var path = meta.getAttribute('content');
      if (id && path) window.__resources[id] = path;
    });
  </script>

  <script type="text/babel" src="bundle.jsx"></script>
</body>
</html>
